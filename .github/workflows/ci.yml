name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate (lint + type-check + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker compose build app

      - name: Lint
        run: docker compose run --rm --no-deps -w /home/app app npm run lint

      - name: Type-check
        run: docker compose run --rm --no-deps -w /home/app app npm run type-check

      - name: Unit tests
        run: docker compose run --rm --no-deps -w /home/app app npm run test

  storybook:
    name: Storybook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker compose build app

      - name: Build Storybook
        run: docker compose run --rm --no-deps -w /home/app app npm run build-storybook

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Boot the app
        run: docker compose up -d app

      - name: Run Playwright suite
        run: docker compose --profile testing run --rm playwright

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: app/tests/playwright/screenshots/
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/tests/playwright/report/
          retention-days: 14
