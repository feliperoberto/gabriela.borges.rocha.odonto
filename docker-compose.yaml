services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - ${APP_PORT:-3000}:3000
    command: ["sh", "-c", "npm run build && npm start"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: on-failure:3
    deploy:
      resources:
        limits:
          # This service is reused for lint/type-check/test in CI (`docker
          # compose run --rm --no-deps app npm run <script>`), not just
          # serving — vitest spins up a jsdom environment per test file in
          # parallel workers. 1024M OOM-killed the suite outright; 2048M/2
          # cpus avoided the kill but tests timed out under CPU throttling
          # (userEvent.click exceeding the 5s default timeout). Sized to
          # comfortably run the full suite locally; matches a GitHub-hosted
          # Actions runner's actual capacity, so CI won't hit the same wall.
          cpus: "4"
          memory: 4096M
        reservations:
          cpus: "0.5"
          memory: 256M

  app-dev:
    build:
      context: ./app
      dockerfile: Dockerfile
    working_dir: /home/app
    volumes:
      - ./app:/home/app
      - app_dev_node_modules:/home/app/node_modules
    ports:
      - ${APP_PORT:-3000}:3000
    environment:
      - NODE_ENV=development
    command: sh -c "npm ci && npm run dev"
    profiles:
      - dev
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M

  storybook:
    build:
      context: ./app
      dockerfile: Dockerfile
    working_dir: /home/app
    volumes:
      - ./app:/home/app
      - app_dev_node_modules:/home/app/node_modules
    ports:
      - ${STORYBOOK_PORT:-6006}:6006
    command: sh -c "npm ci && npm run storybook"
    profiles:
      - dev
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M

  playwright:
    build:
      context: ./app
      dockerfile: Dockerfile
    network_mode: host
    depends_on:
      app:
        condition: service_started
    working_dir: /home/app
    volumes:
      - ./app:/home/app
      - app_node_modules:/home/app/node_modules
      - ./app/tests/playwright/screenshots:/home/app/tests/playwright/screenshots
    environment:
      - PLAYWRIGHT_BASE_URL=http://localhost:${APP_PORT:-3000}
      - NODE_ENV=test
    command: >
      sh -c "npx playwright install --with-deps chromium &&
             npm run playwright"
    profiles:
      - testing
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  app_node_modules:
  app_dev_node_modules:
